    <h1>隐私政策</h1>
    <p>我们极其重视您的隐私。CleanSweep 是一款离线工具，我们的数据处理原则如下：</p>
    <h3>1. 数据收集</h3>
    <p><strong>我们不收集任何个人信息。</strong> 软件仅扫描您本地的注册表和磁盘文件，所有扫描结果仅显示在您的屏幕上，不会上传至任何服务器。</p>
    <h3>2. 激活验证</h3>
    <p>购买后激活时，软件会向 Paddle (我们的支付服务商) 的服务器发送许可证密钥验证请求，该过程仅传输加密的密钥片段，不包含您的个人身份信息。</p>
    <h3>3. 联系方式</h3>
    <p>如有疑问，请联系：[你的邮箱]</p>
